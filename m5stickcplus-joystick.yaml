substitutions:
  device_name: m5stickcplus-joystick
  friendly_name: StickC Plus Joystick

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    # Priority 500: runs AFTER I2C bus setup (600) but BEFORE display setup (250)
    # This ensures AXP192 enables display power before ST7789V initializes
    priority: 500.0
    then:
      - lambda: |-
          // Initialize AXP192 PMIC (I2C addr 0x34) for M5StickC Plus
          // Required: ESPHome does not include the axp192 component in 2025+
          auto *bus = id(internal_i2c);
          uint8_t cmd[2];
          uint8_t reg;
          uint8_t val;

          // LDO2 = 3.0V (display VCC), LDO3 = 3.0V
          // reg 0x28 bits[7:4] = LDO2, bits[3:0] = LDO3
          // V = 1.8 + N*0.1V → 3.0V = N=12 = 0xC
          cmd[0] = 0x28; cmd[1] = 0xCC;
          bus->write(0x34, cmd, 2);

          // Set reg 0x12 directly — do NOT use read-modify-write here.
          // If the read fails silently (returns 0x00), OR-ing would disable
          // DC-DC1/DC-DC3 which are the ESP32's own power rails, killing the device.
          // Known-safe value for M5StickC Plus:
          //   bit 0: DC-DC1 ON  (ESP32 core power — critical)
          //   bit 2: DC-DC3 ON  (3.3V rail — critical)
          //   bit 3: LDO2 ON    (display VCC)
          //   bit 6: EXTEN ON   (external power rail)
          cmd[0] = 0x12; cmd[1] = 0x4D;
          bus->write(0x34, cmd, 2);

          // GPIO0 = LDO output mode (backlight transistor)
          // reg 0x90 bits[2:0] = 0x02 → LDO mode
          cmd[0] = 0x90; cmd[1] = 0x02;
          bus->write(0x34, cmd, 2);

          // GPIO0 LDO voltage = 3.3V
          // reg 0x91 bits[7:4] = N, V = 1.8 + N*0.1 → 3.3V = N=15 = 0xF
          cmd[0] = 0x91; cmd[1] = 0xF0;
          bus->write(0x34, cmd, 2);

esp32:
  board: m5stick-c
  framework:
    type: arduino

logger:
  level: INFO

api:
  encryption:
    key: !secret stickcplus_api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "StickC-Fallback"
    password: !secret ap_password

captive_portal:

# Internal I2C: AXP192 PMIC + IMU (GPIO21=SDA, GPIO22=SCL)
# AXP192 controls display VCC (LDO2) and backlight (GPIO0 LDO)
# Without this, the display has no power after flashing.
i2c:
  - id: internal_i2c
    sda: GPIO21
    scl: GPIO22
    scan: false
  # HAT connector (8-pin row on bottom of M5StickC Plus)
  - id: hat_i2c
    sda: GPIO0
    scl: GPIO26
    scan: true
    frequency: 100kHz

# M5StickC Plus display SPI (ST7789V, 135x240)
spi:
  clk_pin: GPIO13
  mosi_pin: GPIO15

font:
  - file: "gfonts://Roboto"
    id: font_dir
    size: 40
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

color:
  - id: col_white
    hex: "FFFFFF"
  - id: col_gray
    hex: "555555"
  - id: col_yellow
    hex: "FFD700"
  - id: col_cyan
    hex: "00FFFF"
  - id: col_green
    hex: "00FF44"
  - id: col_dark
    hex: "222222"
  - id: col_black
    hex: "000000"

display:
  - platform: ili9xxx
    model: ST7789V
    dimensions:
      width: 135
      height: 240
      offset_width: 52
      offset_height: 40
    cs_pin: GPIO5
    dc_pin: GPIO23
    reset_pin: GPIO18
    invert_colors: true   # ST7789V requires color inversion
    # backlight controlled by AXP192 GPIO0, not a direct ESP32 GPIO
    rotation: 0
    id: m5_display
    update_interval: 150ms
    lambda: |-
      it.fill(id(col_black));

      // Direction — large text centered in portrait (135x240)
      Color dir_col = (id(last_direction) == "center") ? id(col_gray) : id(col_white);
      it.printf(67, 100, id(font_dir), dir_col, TextAlign::CENTER, "%s", id(last_direction).c_str());

      // Button indicators — horizontal row near bottom
      // Joystick push button
      it.filled_circle(22, 195, 10, id(last_joy_btn) ? id(col_yellow) : id(col_dark));
      it.print(22, 210, id(font_small), id(col_gray), TextAlign::CENTER, "JOY");

      // Button A
      it.filled_circle(67, 195, 10, id(button_a).state ? id(col_cyan) : id(col_dark));
      it.print(67, 210, id(font_small), id(col_gray), TextAlign::CENTER, "A");

      // Button B
      it.filled_circle(112, 195, 10, id(button_b).state ? id(col_green) : id(col_dark));
      it.print(112, 210, id(font_small), id(col_gray), TextAlign::CENTER, "B");

globals:
  - id: last_joy_x
    type: int
    restore_value: no
    initial_value: '2048'
  - id: last_joy_y
    type: int
    restore_value: no
    initial_value: '2048'
  - id: last_joy_btn
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: last_direction
    type: std::string
    restore_value: no
    initial_value: '"center"'

# Raw joystick axis values (0–1023, center ~512)
sensor:
  - platform: template
    name: "Joystick X"
    id: joystick_x
    state_class: measurement
    accuracy_decimals: 0
    unit_of_measurement: ""
    update_interval: never

  - platform: template
    name: "Joystick Y"
    id: joystick_y
    state_class: measurement
    accuracy_decimals: 0
    unit_of_measurement: ""
    update_interval: never

# Direction string: up / down / left / right / center
text_sensor:
  - platform: template
    name: "Joystick Direction"
    id: joystick_direction
    update_interval: never

binary_sensor:
  - platform: template
    name: "Joystick Button"
    id: joystick_button

  # Button A (left side, below screen)
  - platform: gpio
    name: "Button A"
    id: button_a
    pin:
      number: GPIO37
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 15ms
      - delayed_off: 15ms

  # Button B (right side)
  - platform: gpio
    name: "Button B"
    id: button_b
    pin:
      number: GPIO39
      inverted: true
      mode:
        input: true
    filters:
      - delayed_on: 15ms
      - delayed_off: 15ms

# Built-in red LED (GPIO10, active low)
output:
  - platform: gpio
    pin:
      number: GPIO10
      inverted: true
    id: builtin_led_output

light:
  - platform: binary
    name: "Built-in LED"
    id: builtin_led
    output: builtin_led_output

# Poll MiniJoyC every 100ms
# MiniJoyC I2C address: 0x54
#   Register 0x00 (2 bytes, little-endian): X axis
#   Register 0x02 (2 bytes, little-endian): Y axis
#   Register 0x30 (1 byte):                Joystick button (0 = pressed)
interval:
  - interval: 100ms
    then:
      - lambda: |-
          auto *bus = id(hat_i2c);

          // helper: write register address then read N bytes
          auto i2c_read = [&](uint8_t reg, uint8_t *out, size_t len) -> bool {
            if (bus->write(0x54, &reg, 1, false) != i2c::ERROR_OK) return false;
            return bus->read(0x54, out, len) == i2c::ERROR_OK;
          };

          uint8_t buf[2];

          // Read X axis (register 0x00, 2 bytes little-endian, 12-bit ADC 0-4095)
          if (i2c_read(0x00, buf, 2)) {
            int x = (buf[1] << 8) | buf[0];
            if (abs(x - id(last_joy_x)) > 50) {
              id(last_joy_x) = x;
              id(joystick_x).publish_state(x);
            }
          }

          // Read Y axis (register 0x02, 2 bytes little-endian, 12-bit ADC 0-4095)
          if (i2c_read(0x02, buf, 2)) {
            int y = (buf[1] << 8) | buf[0];
            if (abs(y - id(last_joy_y)) > 50) {
              id(last_joy_y) = y;
              id(joystick_y).publish_state(y);
            }
          }

          // Read joystick button (register 0x30, 1 byte, 0 = pressed)
          uint8_t btn_buf[1];
          if (i2c_read(0x30, btn_buf, 1)) {
            bool pressed = (btn_buf[0] == 0);
            if (pressed != id(last_joy_btn)) {
              id(last_joy_btn) = pressed;
              id(joystick_button).publish_state(pressed);
            }
          }

          // Compute direction (12-bit ADC: 0-4095, center ~2048)
          // Y is inverted: pushing down → low Y (~317), pushing up → high Y (~3800)
          // X is normal:   pushing right → high X (~4005), pushing left → low X (~300)
          int cx = id(last_joy_x);
          int cy = id(last_joy_y);
          std::string dir;
          if      (cy > 3000) dir = "up";
          else if (cy < 1000) dir = "down";
          else if (cx < 1000) dir = "left";
          else if (cx > 3000) dir = "right";
          else                dir = "center";

          if (dir != id(last_direction)) {
            id(last_direction) = dir;
            id(joystick_direction).publish_state(dir);
          }
